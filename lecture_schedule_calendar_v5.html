<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Schedule Calendar</title>
  <style>
    :root{--bg:#eef0ff;--card:#fff;--text:#23242a;--muted:#7a7f8c;--line:#e4e7ee;--soft:#f0f2f8;--primary:#6c63ff;--primary-soft:#efeeff;--open:#4f7cff;--close:#9b5de5;--lesson:#2fbf71;--cancel:#ef476f;--holiday:#e94f64;--extra:#00a6a6;--time:#8a91a3;--shadow:0 16px 40px rgba(32,37,60,.08)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:28px;background:linear-gradient(135deg,#f7f8fc,#eef0ff);color:var(--text);font-family:"Pretendard","Noto Sans KR",-apple-system,BlinkMacSystemFont,system-ui,sans-serif}button,input,select{font-family:inherit}button{border:0;border-radius:13px;padding:10px 13px;font-weight:800;cursor:pointer;transition:.16s ease}button:hover{transform:translateY(-1px)}input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;font-size:14px;background:#fff;outline:none}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(108,99,255,.1)}label{display:block;font-size:13px;font-weight:900;color:#4b5060;margin:14px 0 7px}.app{max-width:1480px;margin:0 auto;display:grid;grid-template-columns:1fr 460px;gap:24px}.card{background:rgba(255,255,255,.95);border:1px solid rgba(255,255,255,.75);border-radius:28px;box-shadow:var(--shadow);padding:28px}.calendar-card{min-width:0}.side-card{height:fit-content;position:sticky;top:24px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:22px}.label{display:inline-block;background:var(--primary-soft);color:var(--primary);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:900;margin-bottom:11px}h1{margin:0;font-size:36px;letter-spacing:-.045em;line-height:1.15}h2{margin:0 0 18px;font-size:28px;letter-spacing:-.04em;line-height:1.2}.month{color:var(--muted);font-size:17px;font-weight:800;margin-top:8px}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{background:var(--soft);color:#3c4150}.primary{background:var(--primary);color:#fff}.danger{background:var(--cancel);color:#fff}.teal{background:var(--extra);color:#fff}.week,.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:9px}.week{margin-bottom:9px;color:var(--muted);text-align:center;font-size:13px;font-weight:900}.week div{padding:7px 0}.day{min-height:126px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:11px;overflow:hidden;position:relative}.day.blank{background:rgba(255,255,255,.45)}.day.off{background:#f0f1f5;opacity:.64}.date{font-size:17px;font-weight:900;margin-bottom:8px}.sun .date{color:#e74c62}.sat .date{color:#3978e8}.today .date{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:var(--primary);color:#fff}.pill{display:block;margin-top:6px;border-radius:10px;padding:6px 8px;font-size:12px;font-weight:900;line-height:1.25;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pill.open{background:var(--open)}.pill.close{background:var(--close)}.pill.lesson{background:var(--lesson)}.pill.cancel{background:var(--cancel)}.pill.holiday{background:var(--holiday)}.pill.extra{background:var(--extra)}.pill.time{background:var(--time)}.legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:18px;color:var(--muted);font-size:13px;font-weight:800}.legend-item{display:inline-flex;align-items:center;gap:6px}.dot{width:11px;height:11px;border-radius:999px;display:inline-block}.course-actions,.backup-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0 12px}.backup-actions{grid-template-columns:1fr 1fr}.saved-preview{background:#f7f8fc;border:1px solid var(--line);border-radius:16px;padding:12px 14px;color:#4b5060;font-size:13px;line-height:1.6;margin-bottom:16px}.saved-preview strong{color:var(--text)}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip-wrap{display:inline-flex;align-items:center;background:var(--soft);border-radius:13px;overflow:hidden}.chip{background:transparent;color:#3c4150;padding:10px 11px;border-radius:0}.chip.active{background:var(--primary);color:#fff}.chip-delete{width:28px;height:36px;padding:0;border-left:1px solid rgba(0,0,0,.05);border-radius:0;background:rgba(0,0,0,.04);color:#666}.chip-wrap.active .chip-delete{background:rgba(108,99,255,.15);color:#4b43d5}.add-row,.add-date-row,.time-add{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:8px}.picker-btn{width:100%;min-height:43px;background:#fff;border:1px solid var(--line);color:var(--text);text-align:left;font-size:14px;font-weight:700;white-space:normal;line-height:1.35}.picker-btn.placeholder{color:var(--muted)}.picker-pop{display:none;margin-top:8px;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 12px 26px rgba(32,37,60,.08);z-index:20;position:relative}.picker-pop.show{display:block}.picker-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.mini-week,.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}.mini-week{font-size:11px;color:var(--muted);font-weight:900;margin-bottom:6px}.mini-day{min-height:31px;border-radius:9px;background:#f5f6fa;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}.mini-day.blank{background:transparent;cursor:default}.mini-day.selected{background:var(--primary);color:white}.date-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:28px}.date-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:#f0f2f8;color:#3c4150;font-size:12px;font-weight:800}.date-tag button{padding:0;width:18px;height:18px;line-height:18px;border-radius:999px;background:rgba(0,0,0,.08);color:#3c4150;font-size:11px}.empty-list{color:var(--muted);font-size:12px;margin-top:8px}.summary{margin-top:18px;padding:14px;border-radius:16px;background:#f7f8fc;color:#4b5060;font-size:13px;line-height:1.65}.summary strong{color:var(--text)}.notice{margin-top:10px;font-size:12px;line-height:1.5;color:var(--muted)}.file-input{display:none}@media(max-width:1100px){body{padding:16px}.app{grid-template-columns:1fr}.side-card{position:static}}@media(max-width:720px){.card{padding:18px;border-radius:22px}.head{flex-direction:column}h1{font-size:28px}h2{font-size:24px}.day{min-height:96px;padding:8px;border-radius:14px}.pill{font-size:10px;padding:4px 5px}.course-actions,.backup-actions{grid-template-columns:1fr 1fr}.field-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <section class="card calendar-card">
      <div class="head"><div><div class="label">LECTURE SCHEDULE</div><h1>강의 스케줄 캘린더</h1><div class="month" id="monthTitle"></div></div><div class="nav"><button class="btn" id="prevMonth">이전 달</button><button class="btn" id="goToday">오늘</button><button class="primary" id="nextMonth">다음 달</button></div></div>
      <div class="week"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div><div class="calendar" id="calendar"></div>
      <div class="legend"><span class="legend-item"><span class="dot" style="background:var(--open)"></span>개강</span><span class="legend-item"><span class="dot" style="background:var(--close)"></span>종강</span><span class="legend-item"><span class="dot" style="background:var(--lesson)"></span>차수</span><span class="legend-item"><span class="dot" style="background:var(--cancel)"></span>휴강</span><span class="legend-item"><span class="dot" style="background:var(--holiday)"></span>공휴일</span><span class="legend-item"><span class="dot" style="background:var(--extra)"></span>예외 수업일</span></div>
    </section>
    <aside class="card side-card">
      <h2>강의 일정 설정</h2>
      <label for="courseSelect">저장된 강의 일정</label><select id="courseSelect"></select>
      <div class="course-actions"><button class="btn" id="newCourse">새 강의</button><button class="primary" id="saveCourse">저장</button><button class="teal" id="updateCourse">수정</button><button class="danger" id="deleteCourse">삭제</button></div>
      <label>다른 컴퓨터용 백업</label><div class="backup-actions"><button class="primary" id="exportData">일정 내보내기</button><button class="btn" id="importData">일정 불러오기</button></div><input class="file-input" type="file" id="importFile" accept=".json,application/json" />
      <div class="saved-preview" id="savedPreview"></div>
      <label for="courseName">강의명</label><input id="courseName" placeholder="예: 영상그래픽 심화 과정" />
      <div class="field-row"><div><label>개강일</label><button class="picker-btn" data-picker="openDate"></button><div class="picker-pop" id="picker-openDate"></div></div><div><label>종강일</label><button class="picker-btn" data-picker="closeDate"></button><div class="picker-pop" id="picker-closeDate"></div></div></div>
      <label>수업일수</label><div class="chips" id="lessonDayChips"></div><div class="add-row"><input id="newLessonDayInput" type="number" min="1" placeholder="예: 12" /><button class="btn" id="addLessonDay">+ 수업일수 추가</button></div>
      <label>수업 패턴</label><div class="chips" id="patternChips"><button class="chip" data-value="monThu">평일(월~목)</button><button class="chip" data-value="fri">금요(금)</button><button class="chip" data-value="monWed">격일(월·수)</button><button class="chip" data-value="tueThu">격일(화·목)</button><button class="chip" data-value="weekend">주말(토·일)</button></div>
      <label>예외 수업일</label><div class="add-date-row"><div><button class="picker-btn placeholder" data-picker="extraAddDate"></button><div class="picker-pop" id="picker-extraAddDate"></div></div><button class="btn" id="addExtraDate">+ 추가</button></div><div class="date-list" id="extraDateList"></div>
      <label>휴강일</label><div class="add-date-row"><div><button class="picker-btn placeholder" data-picker="cancelAddDate"></button><div class="picker-pop" id="picker-cancelAddDate"></div></div><button class="btn" id="addCancelDate">+ 추가</button></div><div class="date-list" id="cancelDateList"></div>
      <label for="timeSelect">시간대</label><select id="timeSelect"></select><div class="time-add"><input id="newTimeInput" placeholder="예: 18:00 - 21:00" /><button class="btn" id="addTime">+ 시간대 추가</button></div>
      <div class="summary" id="summary"></div><div class="notice">다른 컴퓨터에서 이어서 작업하려면 <strong>일정 내보내기</strong>로 JSON 파일을 저장한 뒤, 다른 컴퓨터에서 이 HTML을 열고 <strong>일정 불러오기</strong>로 JSON 파일을 선택하세요.</div>
    </aside>
  </main>
<script>
const STORAGE_KEY="lectureScheduleCourses_v2",TIME_KEY="lectureScheduleTimeSlots_v1",LESSON_DAY_KEY="lectureScheduleLessonDayOptions_v1";
const holidays={"2026-01-01":"신정","2026-02-16":"설날 연휴","2026-02-17":"설날","2026-02-18":"설날 연휴","2026-03-01":"삼일절","2026-03-02":"대체공휴일","2026-05-05":"어린이날","2026-05-24":"부처님오신날","2026-05-25":"대체공휴일","2026-06-06":"현충일","2026-08-15":"광복절","2026-08-17":"대체공휴일","2026-09-24":"추석 연휴","2026-09-25":"추석","2026-09-26":"추석 연휴","2026-10-03":"개천절","2026-10-05":"대체공휴일","2026-10-09":"한글날","2026-12-25":"성탄절"};
const patternDays={monThu:[1,2,3,4],fri:[5],monWed:[1,3],tueThu:[2,4],weekend:[0,6]},patternLabels={monThu:"평일(월~목)",fri:"금요(금)",monWed:"격일(월·수)",tueThu:"격일(화·목)",weekend:"주말(토·일)"};
const defaultCourse={id:"course_"+Date.now(),name:"영상그래픽 심화 과정",openDate:"2026-06-09",closeDate:"2026-06-30",lessonDays:8,pattern:"monThu",extraDates:[],cancelDates:["2026-06-16"],selectedTime:"09:00 - 11:00"};
let courses=loadCourses(),timeSlots=loadTimeSlots(),lessonDayOptions=loadLessonDayOptions(),selectedCourseId=courses[0]?.id||null,currentMonth=new Date(2026,5,1),tempDates={extraAddDate:"",cancelAddDate:""};
function pad(n){return String(n).padStart(2,"0")}function formatDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function parseDate(k){const[y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d)}function uniqueSorted(a){return [...new Set(a)].filter(Boolean).sort((x,y)=>String(x).localeCompare(String(y),undefined,{numeric:true}))}
function normalizeCourse(c){return{id:c.id||"course_"+Date.now(),name:c.name||"제목 없는 강의",openDate:c.openDate||formatDate(new Date()),closeDate:c.closeDate||c.openDate||formatDate(new Date()),lessonDays:Number(c.lessonDays||4),pattern:c.pattern||"monThu",extraDates:Array.isArray(c.extraDates)?c.extraDates:[],cancelDates:Array.isArray(c.cancelDates)?c.cancelDates:[],selectedTime:c.selectedTime||"09:00 - 11:00"}}
function loadCourses(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");if(Array.isArray(s)&&s.length)return s.map(normalizeCourse)}catch(e){}localStorage.setItem(STORAGE_KEY,JSON.stringify([defaultCourse]));return[defaultCourse]}function loadTimeSlots(){try{const s=JSON.parse(localStorage.getItem(TIME_KEY)||"null");if(Array.isArray(s)&&s.length)return s}catch(e){}const d=["09:00 - 11:00","11:00 - 13:00","14:00 - 16:00"];localStorage.setItem(TIME_KEY,JSON.stringify(d));return d}function loadLessonDayOptions(){try{const s=JSON.parse(localStorage.getItem(LESSON_DAY_KEY)||"null");if(Array.isArray(s)&&s.length)return uniqueSorted(s.map(Number).filter(n=>n>0))}catch(e){}const d=[4,8,9,16];localStorage.setItem(LESSON_DAY_KEY,JSON.stringify(d));return d}function saveAll(){localStorage.setItem(STORAGE_KEY,JSON.stringify(courses.map(normalizeCourse)));localStorage.setItem(TIME_KEY,JSON.stringify(timeSlots));localStorage.setItem(LESSON_DAY_KEY,JSON.stringify(lessonDayOptions))}
function getCourse(){return courses.find(c=>c.id===selectedCourseId)||courses[0]}function setCourseValue(k,v){const c=getCourse();if(!c)return;c[k]=v;if(k==="openDate"||k==="closeDate")currentMonth=new Date(parseDate(v).getFullYear(),parseDate(v).getMonth(),1);renderAll()}function isPatternDay(k){const c=getCourse();return c&&(patternDays[c.pattern].includes(parseDate(k).getDay())||c.extraDates.includes(k))}function isExcluded(k){const c=getCourse();return c&&(c.cancelDates.includes(k)||Boolean(holidays[k]))}
function getLessonMap(){const c=getCourse(),map={};if(!c)return map;let cur=parseDate(c.openDate),end=parseDate(c.closeDate),cnt=0,safe=0;while(cur<=end&&cnt<c.lessonDays&&safe<600){const k=formatDate(cur);if(isPatternDay(k)&&!isExcluded(k)){cnt++;map[k]=cnt}cur.setDate(cur.getDate()+1);safe++}return map}function addPill(p,cls,t){const s=document.createElement("span");s.className=`pill ${cls}`;s.textContent=t;p.appendChild(s)}
function renderCalendar(){const c=getCourse(),cal=document.getElementById("calendar");cal.innerHTML="";const y=currentMonth.getFullYear(),m=currentMonth.getMonth(),today=formatDate(new Date()),lessonMap=getLessonMap();document.getElementById("monthTitle").textContent=`${y}년 ${m+1}월`;const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();for(let i=0;i<first;i++){const b=document.createElement("div");b.className="day blank";cal.appendChild(b)}for(let d=1;d<=last;d++){const date=new Date(y,m,d),k=formatDate(date),dow=date.getDay(),cell=document.createElement("div");cell.className="day";if(dow===0)cell.classList.add("sun");if(dow===6)cell.classList.add("sat");if(k===today)cell.classList.add("today");if(c&&!isPatternDay(k)&&!holidays[k])cell.classList.add("off");const dateEl=document.createElement("div");dateEl.className="date";dateEl.textContent=d;cell.appendChild(dateEl);if(holidays[k])addPill(cell,"holiday",holidays[k]);if(c?.cancelDates.includes(k))addPill(cell,"cancel","휴강");if(c?.extraDates.includes(k))addPill(cell,"extra","예외 수업일");if(c&&lessonMap[k]){if(k===c.openDate)addPill(cell,"open","개강");else if(lessonMap[k]===c.lessonDays||k===c.closeDate)addPill(cell,"close","종강");else addPill(cell,"lesson",`${lessonMap[k]}일차`);if(!isExcluded(k))addPill(cell,"time",c.selectedTime||timeSlots[0])}cal.appendChild(cell)}}
function renderCourseSelect(){const s=document.getElementById("courseSelect");s.innerHTML="";courses.forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=c.name;if(c.id===selectedCourseId)o.selected=true;s.appendChild(o)})}function renderTimeSelect(){const s=document.getElementById("timeSelect"),c=getCourse();s.innerHTML="";timeSlots.forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;if((c?.selectedTime||timeSlots[0])===t)o.selected=true;s.appendChild(o)})}
function renderLessonDayChips(){const box=document.getElementById("lessonDayChips"),c=getCourse();box.innerHTML="";if(!lessonDayOptions.length)lessonDayOptions=[4];lessonDayOptions=uniqueSorted(lessonDayOptions.map(Number).filter(n=>n>0));if(c&&!lessonDayOptions.includes(Number(c.lessonDays)))lessonDayOptions=uniqueSorted([...lessonDayOptions,Number(c.lessonDays)]);lessonDayOptions.forEach(n=>{const wrap=document.createElement("span");wrap.className="chip-wrap"+(c&&Number(c.lessonDays)===n?" active":"");const b=document.createElement("button");b.type="button";b.className="chip"+(c&&Number(c.lessonDays)===n?" active":"");b.textContent=`${n}일`;b.onclick=()=>setCourseValue("lessonDays",n);const del=document.createElement("button");del.type="button";del.className="chip-delete";del.textContent="×";del.title="수업일수 삭제";del.onclick=e=>{e.stopPropagation();deleteLessonDayOption(n)};wrap.append(b,del);box.appendChild(wrap)})}function deleteLessonDayOption(n){if(!confirm(`${n}일 수업일수를 삭제할까요?`))return;lessonDayOptions=lessonDayOptions.filter(v=>Number(v)!==Number(n));if(!lessonDayOptions.length)lessonDayOptions=[4];courses.forEach(c=>{if(Number(c.lessonDays)===Number(n))c.lessonDays=lessonDayOptions[0]});saveAll();renderAll()}
function renderChipState(id,v){document.querySelectorAll(`#${id} .chip`).forEach(b=>b.classList.toggle("active",String(b.dataset.value)===String(v)))}function renderForm(){const c=getCourse();if(!c)return;document.getElementById("courseName").value=c.name;renderPickerTexts();renderLessonDayChips();renderChipState("patternChips",c.pattern);renderTimeSelect();renderDateLists()}function renderPickerTexts(){const c=getCourse();if(!c)return;["openDate","closeDate"].forEach(k=>{const b=document.querySelector(`[data-picker="${k}"]`);b.textContent=c[k];b.classList.remove("placeholder")});["extraAddDate","cancelAddDate"].forEach(k=>{const b=document.querySelector(`[data-picker="${k}"]`);b.textContent=tempDates[k]||"미니캘린더에서 날짜 선택";b.classList.toggle("placeholder",!tempDates[k])})}function renderDateLists(){const c=getCourse();renderOneDateList("extraDateList",c.extraDates,"extraDates");renderOneDateList("cancelDateList",c.cancelDates,"cancelDates")}function renderOneDateList(id,dates,key){const box=document.getElementById(id);box.innerHTML="";if(!dates.length){const e=document.createElement("div");e.className="empty-list";e.textContent="추가된 날짜가 없습니다.";box.appendChild(e);return}dates.forEach(date=>{const tag=document.createElement("span");tag.className="date-tag";tag.innerHTML=`${date} <button type="button">×</button>`;tag.querySelector("button").onclick=()=>{const c=getCourse();c[key]=c[key].filter(d=>d!==date);renderAll()};box.appendChild(tag)})}function renderSavedPreview(){document.getElementById("savedPreview").innerHTML=`<strong>저장된 강의</strong><br>`+courses.slice(0,4).map((c,i)=>`${i+1}. ${c.name} · ${patternLabels[c.pattern]} · ${c.lessonDays}일`).join("<br>")}function renderSummary(){const c=getCourse(),s=document.getElementById("summary");if(!c){s.textContent="선택된 강의가 없습니다.";return}const keys=Object.keys(getLessonMap()).sort(),actual=keys[keys.length-1]||"-";s.innerHTML=`<strong>선택된 강의: ${c.name}</strong><br>개강일: ${c.openDate}<br>종강 기준일: ${c.closeDate}<br>실제 종료일: ${actual}<br>수업일수: ${c.lessonDays}일<br>수업 패턴: ${patternLabels[c.pattern]}<br>시간대: ${c.selectedTime||timeSlots[0]}<br>예외 수업일: ${c.extraDates.length?c.extraDates.join(", "):"없음"}<br>휴강일: ${c.cancelDates.length?c.cancelDates.join(", "):"없음"}`}function renderAll(){renderCourseSelect();renderForm();renderCalendar();renderSavedPreview();renderSummary();saveAll()}
function makeCourseDatePicker(k){const b=document.querySelector(`[data-picker="${k}"]`),pop=document.getElementById(`picker-${k}`);b.onclick=()=>{document.querySelectorAll(".picker-pop").forEach(p=>{if(p!==pop)p.classList.remove("show")});const c=getCourse();pop.classList.toggle("show");drawPicker(pop,parseDate(c?.[k]||formatDate(currentMonth)),[c[k]],(dateKey,y,m)=>{c[k]=dateKey;currentMonth=new Date(y,m,1);pop.classList.remove("show");renderAll()})}}function makeTempDatePicker(k){const b=document.querySelector(`[data-picker="${k}"]`),pop=document.getElementById(`picker-${k}`);b.onclick=()=>{document.querySelectorAll(".picker-pop").forEach(p=>{if(p!==pop)p.classList.remove("show")});pop.classList.toggle("show");drawPicker(pop,tempDates[k]?parseDate(tempDates[k]):parseDate(getCourse()?.openDate||formatDate(currentMonth)),tempDates[k]?[tempDates[k]]:[],dateKey=>{tempDates[k]=dateKey;pop.classList.remove("show");renderPickerTexts()})}}
function drawPicker(pop,viewDate,selectedDates,onSelect){const draw=v=>{const y=v.getFullYear(),m=v.getMonth(),first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();pop.innerHTML=`<div class="picker-head"><button class="btn picker-prev" type="button">‹</button><strong>${y}년 ${m+1}월</strong><button class="btn picker-next" type="button">›</button></div><div class="mini-week"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div><div class="mini-grid"></div>`;const grid=pop.querySelector(".mini-grid");for(let i=0;i<first;i++){const blank=document.createElement("div");blank.className="mini-day blank";grid.appendChild(blank)}for(let d=1;d<=last;d++){const k=formatDate(new Date(y,m,d)),cell=document.createElement("div");cell.className="mini-day";if(selectedDates.includes(k))cell.classList.add("selected");cell.textContent=d;cell.onclick=()=>onSelect(k,y,m);grid.appendChild(cell)}pop.querySelector(".picker-prev").onclick=e=>{e.stopPropagation();draw(new Date(y,m-1,1))};pop.querySelector(".picker-next").onclick=e=>{e.stopPropagation();draw(new Date(y,m+1,1))}};draw(viewDate)}function addDateToCourse(tk,ck){const c=getCourse(),date=tempDates[tk];if(!date){alert("추가할 날짜를 먼저 선택해주세요.");return}c[ck]=uniqueSorted([...c[ck],date]);tempDates[tk]="";renderAll()}
document.getElementById("courseSelect").onchange=e=>{selectedCourseId=e.target.value;tempDates.extraAddDate="";tempDates.cancelAddDate="";const c=getCourse();if(c)currentMonth=new Date(parseDate(c.openDate).getFullYear(),parseDate(c.openDate).getMonth(),1);renderAll()};document.getElementById("newCourse").onclick=()=>{const t=new Date(),nc={id:"course_"+Date.now(),name:"새 강의 일정",openDate:formatDate(t),closeDate:formatDate(t),lessonDays:lessonDayOptions[0]||4,pattern:"monThu",extraDates:[],cancelDates:[],selectedTime:timeSlots[0]||"09:00 - 11:00"};courses.push(nc);selectedCourseId=nc.id;tempDates.extraAddDate="";tempDates.cancelAddDate="";currentMonth=new Date(t.getFullYear(),t.getMonth(),1);renderAll()};["saveCourse","updateCourse"].forEach(id=>document.getElementById(id).onclick=()=>{const c=getCourse();if(!c)return;c.name=document.getElementById("courseName").value.trim()||"제목 없는 강의";c.selectedTime=document.getElementById("timeSelect").value||timeSlots[0];saveAll();renderAll();alert(id==="saveCourse"?"강의 일정이 저장되었습니다.":"강의 일정이 수정되었습니다.")});document.getElementById("deleteCourse").onclick=()=>{const c=getCourse();if(!c)return;if(!confirm(`'${c.name}' 일정을 삭제할까요?`))return;courses=courses.filter(x=>x.id!==c.id);if(!courses.length)courses=[{...defaultCourse,id:"course_"+Date.now()}];selectedCourseId=courses[0].id;saveAll();renderAll()};document.getElementById("courseName").oninput=()=>{const c=getCourse();if(!c)return;c.name=document.getElementById("courseName").value;renderCourseSelect();renderSummary();saveAll()};document.getElementById("patternChips").onclick=e=>{if(!e.target.dataset.value)return;setCourseValue("pattern",e.target.dataset.value)};document.getElementById("addLessonDay").onclick=()=>{const input=document.getElementById("newLessonDayInput"),n=Number(input.value);if(!Number.isInteger(n)||n<1){alert("1 이상의 숫자를 입력해주세요.");return}lessonDayOptions=uniqueSorted([...lessonDayOptions,n]);setCourseValue("lessonDays",n);input.value=""};document.getElementById("timeSelect").onchange=e=>setCourseValue("selectedTime",e.target.value);document.getElementById("addTime").onclick=()=>{const input=document.getElementById("newTimeInput"),v=input.value.trim();if(!v){alert("추가할 시간대를 입력해주세요.");return}if(!timeSlots.includes(v))timeSlots.push(v);const c=getCourse();if(c)c.selectedTime=v;input.value="";renderAll()};document.getElementById("addExtraDate").onclick=()=>addDateToCourse("extraAddDate","extraDates");document.getElementById("addCancelDate").onclick=()=>addDateToCourse("cancelAddDate","cancelDates");document.getElementById("prevMonth").onclick=()=>{currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()-1,1);renderCalendar()};document.getElementById("nextMonth").onclick=()=>{currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,1);renderCalendar()};document.getElementById("goToday").onclick=()=>{const t=new Date();currentMonth=new Date(t.getFullYear(),t.getMonth(),1);renderCalendar()};document.addEventListener("click",e=>{if(!e.target.closest(".picker-pop")&&!e.target.closest(".picker-btn"))document.querySelectorAll(".picker-pop").forEach(p=>p.classList.remove("show"))});
document.getElementById("exportData").onclick=()=>{const data={version:"lecture_schedule_calendar_v5",exportedAt:new Date().toISOString(),courses:courses.map(normalizeCourse),timeSlots,lessonDayOptions};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`lecture_schedule_backup_${formatDate(new Date())}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)};document.getElementById("importData").onclick=()=>document.getElementById("importFile").click();document.getElementById("importFile").onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);if(!Array.isArray(data.courses)||!data.courses.length)throw new Error("invalid");if(!confirm("불러온 일정으로 현재 브라우저의 저장 데이터를 교체할까요?"))return;courses=data.courses.map(normalizeCourse);timeSlots=Array.isArray(data.timeSlots)&&data.timeSlots.length?data.timeSlots:timeSlots;lessonDayOptions=Array.isArray(data.lessonDayOptions)&&data.lessonDayOptions.length?uniqueSorted(data.lessonDayOptions.map(Number).filter(n=>n>0)):lessonDayOptions;selectedCourseId=courses[0].id;currentMonth=new Date(parseDate(courses[0].openDate).getFullYear(),parseDate(courses[0].openDate).getMonth(),1);saveAll();renderAll();alert("일정을 불러왔습니다.")}catch(err){alert("불러올 수 없는 파일입니다. 내보내기한 JSON 파일인지 확인해주세요.")}finally{e.target.value=""}};reader.readAsText(file)};
makeCourseDatePicker("openDate");makeCourseDatePicker("closeDate");makeTempDatePicker("extraAddDate");makeTempDatePicker("cancelAddDate");renderAll();
</script>
